<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Weekly Timeline</title>
<style>
:root{--bg0:#05070c;--bg1:#0b1120;--bg2:#12192a;--panel:rgba(255,255,255,.06);--line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.05);--text:#edf2f8;--muted:#97a3b4;--red:#d24d4d;--gold1:#f0dbb0;--gold2:#c89d57;--gold3:#8b6732;--moon:rgba(205,217,255,.14);--shadow:0 18px 70px rgba(0,0,0,.42);--time-col:86px;--header-h:64px;--hour-h:84px;--day-w:156px;--radius:24px}
*{box-sizing:border-box}html,body{height:100%}body{margin:0;font-family:Inter,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 82% 10%, var(--moon), transparent 10%),radial-gradient(circle at top left, rgba(200,157,87,.08), transparent 16%),radial-gradient(circle at bottom right, rgba(210,77,77,.05), transparent 20%),linear-gradient(180deg,var(--bg0),var(--bg1) 55%,var(--bg2));overflow:hidden}
.app{height:100vh;padding:8px}.surface{position:relative;height:100%;border-radius:var(--radius);border:1px solid var(--line);background:radial-gradient(circle at 85% 14%, rgba(205,217,255,.10), transparent 12%),linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025)),linear-gradient(180deg, rgba(7,10,15,.94), rgba(7,10,15,.88));backdrop-filter:blur(18px);box-shadow:var(--shadow);overflow:hidden}
.calendar-scroll{position:absolute;inset:0;overflow:auto;-webkit-overflow-scrolling:touch;touch-action:auto;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.15) transparent}
.calendar{position:relative;min-width:calc(var(--time-col) + 7*var(--day-w));display:grid;grid-template-columns:var(--time-col) repeat(7,minmax(var(--day-w),1fr));grid-template-rows:var(--header-h) repeat(24,var(--hour-h))}
.corner,.day-header,.time-cell{backdrop-filter:blur(18px)}
.corner{grid-column:1;grid-row:1;position:sticky;top:0;left:0;z-index:50;border-right:1px solid var(--line);border-bottom:1px solid var(--line);background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03)),rgba(8,12,18,.97)}
.day-header{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--line);border-right:1px solid var(--line2);background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03)),rgba(8,12,18,.94)}
.day-header.today{background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04)),linear-gradient(180deg, rgba(210,77,77,.10), rgba(255,255,255,.02)),rgba(8,12,18,.95)}
.day-header-inner{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:0 10px}.day-title{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:0}.day-name{font-size:13px;font-weight:800;white-space:nowrap}.day-date{font-size:11px;color:var(--muted);margin-top:3px}
.week-nav{width:34px;height:34px;border:none;border-radius:12px;cursor:pointer;display:grid;place-items:center;color:var(--text);background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.03));border:1px solid var(--line);flex:0 0 auto}
.time-cell{position:sticky;left:0;z-index:30;border-right:1px solid var(--line);border-bottom:1px solid var(--line2);background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02)),rgba(8,12,18,.96);overflow:hidden}
.time-inner{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding-right:16px;font-size:12px;color:var(--muted);font-weight:700}
.time-ruler{position:absolute;top:0;right:8px;width:14px;height:100%}.time-ruler .base,.time-ruler .main,.time-ruler .q1,.time-ruler .q2,.time-ruler .q3{position:absolute;right:0;height:1px;background:rgba(255,255,255,.22)}.time-ruler .base{top:0;bottom:0;width:1px;height:auto;background:rgba(255,255,255,.08)}.time-ruler .main{top:0;width:14px;background:rgba(255,255,255,.34)}.time-ruler .q1{top:25%;width:6px}.time-ruler .q2{top:50%;width:10px;background:rgba(255,255,255,.28)}.time-ruler .q3{top:75%;width:6px}.time-cell.last .time-ruler .main{top:auto;bottom:0}
.cell{position:relative;border-right:1px solid var(--line2);border-bottom:1px solid var(--line2);cursor:pointer;background:linear-gradient(180deg, transparent 24.5%, rgba(255,255,255,.045) 25%, transparent 25.5%),linear-gradient(180deg, transparent 49.5%, rgba(255,255,255,.055) 50%, transparent 50.5%),linear-gradient(180deg, transparent 74.5%, rgba(255,255,255,.045) 75%, transparent 75.5%),rgba(255,255,255,.012)}
.cell.alt{background:linear-gradient(180deg, transparent 24.5%, rgba(255,255,255,.045) 25%, transparent 25.5%),linear-gradient(180deg, transparent 49.5%, rgba(255,255,255,.055) 50%, transparent 50.5%),linear-gradient(180deg, transparent 74.5%, rgba(255,255,255,.045) 75%, transparent 75.5%),rgba(255,255,255,.018)}
.cell.today{background:linear-gradient(180deg, transparent 24.5%, rgba(255,255,255,.05) 25%, transparent 25.5%),linear-gradient(180deg, transparent 49.5%, rgba(255,255,255,.06) 50%, transparent 50.5%),linear-gradient(180deg, transparent 74.5%, rgba(255,255,255,.05) 75%, transparent 75.5%),linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02)),rgba(255,255,255,.03)}
.cell.today.alt{background:linear-gradient(180deg, transparent 24.5%, rgba(255,255,255,.05) 25%, transparent 25.5%),linear-gradient(180deg, transparent 49.5%, rgba(255,255,255,.06) 50%, transparent 50.5%),linear-gradient(180deg, transparent 74.5%, rgba(255,255,255,.05) 75%, transparent 75.5%),linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025)),rgba(255,255,255,.04)}
.events-layer{position:absolute;inset:0;pointer-events:none;z-index:25}.event-card{position:absolute;border-radius:18px;padding:10px 12px;pointer-events:auto;cursor:pointer;overflow:hidden;border:1px solid rgba(255,255,255,.12);box-shadow:0 10px 24px rgba(0,0,0,.20);backdrop-filter:blur(8px)}.event-card:before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:rgba(255,255,255,.65)}.event-title{font-size:13px;font-weight:800;line-height:1.2;margin-left:6px}.event-meta{font-size:11px;color:rgba(255,255,255,.86);margin-top:6px;margin-left:6px}
.cat-work{background:linear-gradient(180deg, rgba(116,142,186,.34), rgba(116,142,186,.20))}.cat-business{background:linear-gradient(180deg, rgba(152,130,182,.32), rgba(152,130,182,.18))}.cat-study{background:linear-gradient(180deg, rgba(109,153,145,.32), rgba(109,153,145,.18))}.cat-sport{background:linear-gradient(180deg, rgba(120,156,114,.30), rgba(120,156,114,.18))}.cat-hobby{background:linear-gradient(180deg, rgba(176,141,114,.32), rgba(176,141,114,.18))}.cat-other{background:linear-gradient(180deg, rgba(125,132,145,.30), rgba(125,132,145,.16))}
.now-line{position:absolute;left:0;right:0;height:2px;background:var(--red);z-index:32;pointer-events:none}.now-line:before{content:'';position:absolute;left:0;top:50%;width:10px;height:10px;border-radius:50%;background:var(--red);transform:translate(-50%,-50%)}
.fab{position:absolute;right:14px;bottom:calc(84px + env(safe-area-inset-bottom));z-index:70;min-height:52px;padding:0 18px;border:none;border-radius:18px;cursor:pointer;color:#13100a;font-size:14px;font-weight:800;background:linear-gradient(180deg,var(--gold1),var(--gold2) 58%,var(--gold3));box-shadow:0 16px 36px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.38)}
.modal-backdrop{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(4,7,12,.66);backdrop-filter:blur(10px);z-index:100}.modal-backdrop.show{display:flex}
.modal{width:min(100%,520px);border-radius:26px;border:1px solid var(--line);background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02)),linear-gradient(180deg, rgba(12,17,24,.98), rgba(9,13,18,.98));box-shadow:var(--shadow);padding:22px}.modal-title{margin:0 0 18px;font-size:28px;letter-spacing:-.04em}
.form{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field{display:flex;flex-direction:column;gap:8px}.field.full{grid-column:1/-1}.field label{font-size:12px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}.field input,.field select{width:100%;height:48px;border-radius:15px;border:1px solid var(--line);background:rgba(255,255,255,.045);color:var(--text);padding:0 14px;font-size:14px;outline:none}
.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}.modal-btn{height:48px;border:none;border-radius:16px;cursor:pointer;font-size:15px;font-weight:800;color:var(--text);background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.04));border:1px solid var(--line)}.modal-btn.secondary{color:rgba(255,222,222,.95);background:linear-gradient(180deg, rgba(210,77,77,.22), rgba(210,77,77,.10));border-color:rgba(210,77,77,.22)}.modal-btn.primary{color:#13100a;background:linear-gradient(180deg,var(--gold1),var(--gold2) 58%,var(--gold3))}
.sync-note{margin-top:10px;color:#7d8797;font-size:12px;line-height:1.45}
@media (max-width:840px){:root{--time-col:82px;--header-h:62px;--hour-h:78px;--day-w:140px}.day-name{font-size:12px}.day-date{font-size:10px}.modal-title{font-size:24px}}
@media (max-width:560px){.surface{border-radius:20px}.fab{right:12px;bottom:calc(94px + env(safe-area-inset-bottom));min-height:48px;padding:0 16px;font-size:13px}.modal{padding:18px;border-radius:22px}.form{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app"><div class="surface">
  <div class="calendar-scroll" id="calendarScroll">
    <div class="calendar" id="calendar"></div>
    <div class="events-layer" id="eventsLayer"></div>
    <div class="now-line" id="nowLine"></div>
  </div>
  <button class="fab" id="openAddBtn">Добавить мероприятие</button>
</div></div>

<div class="modal-backdrop" id="modalBackdrop"><div class="modal">
  <h2 class="modal-title" id="modalTitle">Добавить мероприятие</h2>
  <div class="form">
    <div class="field full"><label for="eventTitle">Название мероприятия</label><input id="eventTitle" type="text" placeholder="Например: Встреча с клиентом"></div>
    <div class="field full"><label for="eventDate">Дата</label><input id="eventDate" type="date"></div>
    <div class="field"><label for="eventStart">Время начала</label><input id="eventStart" type="time" step="900"></div>
    <div class="field"><label for="eventEnd">Время конца</label><input id="eventEnd" type="time" step="900"></div>
    <div class="field full"><label for="eventCategory">Категория</label>
      <select id="eventCategory"><option value="work">работа</option><option value="business">бизнес</option><option value="study">учёба</option><option value="sport">спорт</option><option value="hobby">хобби</option><option value="other">другое</option></select>
    </div>
  </div>
  <div class="modal-actions"><button class="modal-btn secondary" id="secondaryBtn">Стереть</button><button class="modal-btn primary" id="primaryBtn">Добавить</button></div>
  <div class="sync-note">События сохраняются через localStorage. Позже сюда можно подключить Firebase или Supabase.</div>
</div></div>

<script>
(() => {
const DAYS=['Понедельник','Вторник','Среда','Четверг','Пятница','Суббота','Воскресенье'];
const CATEGORIES={work:{label:'работа',className:'cat-work'},business:{label:'бизнес',className:'cat-business'},study:{label:'учёба',className:'cat-study'},sport:{label:'спорт',className:'cat-sport'},hobby:{label:'хобби',className:'cat-hobby'},other:{label:'другое',className:'cat-other'}};
const STORAGE_KEY='premium-weekly-timeline-v3';
const D={calendar:document.getElementById('calendar'),eventsLayer:document.getElementById('eventsLayer'),nowLine:document.getElementById('nowLine'),scroll:document.getElementById('calendarScroll'),openAddBtn:document.getElementById('openAddBtn'),modalBackdrop:document.getElementById('modalBackdrop'),modalTitle:document.getElementById('modalTitle'),title:document.getElementById('eventTitle'),date:document.getElementById('eventDate'),start:document.getElementById('eventStart'),end:document.getElementById('eventEnd'),category:document.getElementById('eventCategory'),primaryBtn:document.getElementById('primaryBtn'),secondaryBtn:document.getElementById('secondaryBtn')};
let weekOffset=0, editingId=null, events=loadLocalEvents();
function loadLocalEvents(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')}catch{return[]}}
function saveLocalEvents(){localStorage.setItem(STORAGE_KEY,JSON.stringify(events))}
async function saveRemoteEvents(){return true}
function startOfWeek(date){const d=new Date(date),day=(d.getDay()+6)%7; d.setHours(0,0,0,0); d.setDate(d.getDate()-day); return d}
function displayWeekStartFor(offset){const d=new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()+offset*7); return d}
function formatISO(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function formatShort(d){return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}`}
function timeToMinutes(v){const [h,m]=v.split(':').map(Number); return h*60+m}
function minutesToTime(v){const h=Math.floor(v/60),m=v%60; return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`}
function clampEventEnd(s,e){if(e<=s)return Math.min(s+60,24*60); return Math.min(e,24*60)}
function eventSort(a,b){if(a.date!==b.date)return a.date.localeCompare(b.date); return timeToMinutes(a.start)-timeToMinutes(b.start)}
function escapeHtml(text){return text.replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}

function buildCalendar(){
  const displayStart=displayWeekStartFor(weekOffset), todayISO=formatISO(new Date());
  D.calendar.innerHTML='';
  const corner=document.createElement('div'); corner.className='corner'; D.calendar.appendChild(corner);
  for(let dayIndex=0; dayIndex<7; dayIndex++){
    const date=new Date(displayStart); date.setDate(displayStart.getDate()+dayIndex); const isToday=formatISO(date)===todayISO; const weekday=(date.getDay()+6)%7;
    const head=document.createElement('div'); head.className='day-header'+(isToday?' today':''); head.style.gridColumn=String(dayIndex+2); head.style.gridRow='1';
    const leftNav=dayIndex===0?'<button class="week-nav" data-nav="-1" aria-label="Предыдущая неделя">‹</button>':'<span style="width:34px;height:34px;display:block"></span>';
    const rightNav=dayIndex===6?'<button class="week-nav" data-nav="1" aria-label="Следующая неделя">›</button>':'<span style="width:34px;height:34px;display:block"></span>';
    head.innerHTML=`<div class="day-header-inner">${leftNav}<div class="day-title"><div class="day-name">${DAYS[weekday]}</div><div class="day-date">${formatShort(date)}</div></div>${rightNav}</div>`;
    D.calendar.appendChild(head);
  }
  for(let hour=0; hour<24; hour++){
    const label=document.createElement('div'); label.className='time-cell'+(hour===23?' last':''); label.style.gridColumn='1'; label.style.gridRow=String(hour+2);
    label.innerHTML=`<div class="time-inner">${String(hour).padStart(2,'0')}:00<div class="time-ruler"><span class="base"></span><span class="main"></span><span class="q1"></span><span class="q2"></span><span class="q3"></span></div></div>`; D.calendar.appendChild(label);
    for(let dayIndex=0; dayIndex<7; dayIndex++){
      const date=new Date(displayStart); date.setDate(displayStart.getDate()+dayIndex); const isToday=formatISO(date)===todayISO;
      const cell=document.createElement('div'); cell.className='cell'+(dayIndex%2?' alt':'')+(isToday?' today':''); cell.style.gridColumn=String(dayIndex+2); cell.style.gridRow=String(hour+2); cell.dataset.date=formatISO(date); cell.dataset.hour=String(hour); D.calendar.appendChild(cell);
    }
  }
  const bottom=document.createElement('div'); bottom.className='time-cell last'; bottom.style.gridColumn='1'; bottom.style.gridRow='26'; bottom.style.height='0px'; bottom.style.minHeight='0'; bottom.style.borderBottom='none';
  bottom.innerHTML=`<div class="time-inner" style="position:absolute;bottom:-10px;left:0;right:0;height:auto;justify-content:center;padding-right:16px;">24:00<div class="time-ruler"><span class="base"></span><span class="main"></span></div></div>`; D.calendar.appendChild(bottom);
  D.calendar.querySelectorAll('[data-nav]').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation(); weekOffset+=Number(btn.dataset.nav); buildCalendar(); renderEvents(); updateNowLine()}));
  D.calendar.querySelectorAll('.cell').forEach(cell=>cell.addEventListener('click',e=>{const rect=cell.getBoundingClientRect(), offsetY=e.clientY-rect.top, quarter=Math.min(3,Math.max(0,Math.floor(offsetY/(rect.height/4)))), hour=Number(cell.dataset.hour), startMinutes=hour*60+quarter*15, endMinutes=Math.min(startMinutes+60,24*60); openAddModal(cell.dataset.date,minutesToTime(startMinutes),minutesToTime(endMinutes))}));
}
function renderEvents(){
  const displayStart=displayWeekStartFor(weekOffset), displayEnd=new Date(displayStart); displayEnd.setDate(displayEnd.getDate()+7);
  D.eventsLayer.innerHTML='';
  const st=getComputedStyle(document.documentElement), timeCol=parseFloat(st.getPropertyValue('--time-col')), headerH=parseFloat(st.getPropertyValue('--header-h')), hourH=parseFloat(st.getPropertyValue('--hour-h')), totalWidth=D.calendar.offsetWidth, dayW=(totalWidth-timeCol)/7;
  D.eventsLayer.style.width=`${D.calendar.offsetWidth}px`; D.eventsLayer.style.height=`${D.calendar.offsetHeight}px`;
  events.filter(ev=>{const d=new Date(ev.date+'T00:00:00'); return d>=displayStart && d<displayEnd}).sort(eventSort).forEach(ev=>{
    const d=new Date(ev.date+'T00:00:00'), dayIndex=Math.floor((d-displayStart)/86400000), start=timeToMinutes(ev.start), end=timeToMinutes(ev.end), top=headerH+(start/60)*hourH, height=Math.max(((end-start)/60)*hourH-6,34), left=timeCol+dayIndex*dayW+6, width=dayW-12;
    const card=document.createElement('div'); card.className=`event-card ${CATEGORIES[ev.category]?.className||'cat-other'}`; card.style.top=`${top+3}px`; card.style.left=`${left}px`; card.style.width=`${width}px`; card.style.height=`${height}px`;
    card.innerHTML=`<div class="event-title">${escapeHtml(ev.title)}</div><div class="event-meta">${ev.start} — ${ev.end} • ${CATEGORIES[ev.category]?.label||'другое'}</div>`;
    card.addEventListener('click',evn=>{evn.stopPropagation(); openEditModal(ev.id)}); D.eventsLayer.appendChild(card);
  });
}
function updateNowLine(){
  const now=new Date(), displayStart=displayWeekStartFor(weekOffset), displayEnd=new Date(displayStart); displayEnd.setDate(displayEnd.getDate()+7);
  if(!(now>=displayStart && now<displayEnd)){D.nowLine.style.display='none'; return}
  const st=getComputedStyle(document.documentElement), headerH=parseFloat(st.getPropertyValue('--header-h')), hourH=parseFloat(st.getPropertyValue('--hour-h')), minutes=now.getHours()*60+now.getMinutes();
  D.nowLine.style.display='block'; D.nowLine.style.top=`${headerH+(minutes/60)*hourH}px`; D.nowLine.style.width=`${D.calendar.offsetWidth}px`;
}
function openAddModal(date,start,end){editingId=null; D.modalTitle.textContent='Добавить мероприятие'; D.primaryBtn.textContent='Добавить'; D.secondaryBtn.textContent='Стереть'; D.title.value=''; D.date.value=date; D.start.value=start; D.end.value=end; D.category.value='work'; D.modalBackdrop.classList.add('show')}
function openEditModal(id){const ev=events.find(x=>x.id===id); if(!ev)return; editingId=id; D.modalTitle.textContent='Редактировать мероприятие'; D.primaryBtn.textContent='Редактировать'; D.secondaryBtn.textContent='Удалить'; D.title.value=ev.title; D.date.value=ev.date; D.start.value=ev.start; D.end.value=ev.end; D.category.value=ev.category; D.modalBackdrop.classList.add('show')}
function closeModal(){D.modalBackdrop.classList.remove('show')}
function submitModal(){const title=D.title.value.trim(), date=D.date.value, start=D.start.value, end=D.end.value, category=D.category.value; if(!title||!date||!start||!end){alert('Заполни все поля.'); return} const startMin=timeToMinutes(start), endMin=clampEventEnd(startMin,timeToMinutes(end)), payload={title,date,start:minutesToTime(startMin),end:minutesToTime(endMin),category}; if(editingId){const t=events.find(x=>x.id===editingId); if(t)Object.assign(t,payload)} else {events.push({id:(crypto.randomUUID?crypto.randomUUID():String(Date.now()+Math.random())),...payload})} events.sort(eventSort); saveLocalEvents(); saveRemoteEvents(events); renderEvents(); closeModal()}
function secondaryModalAction(){if(editingId){events=events.filter(x=>x.id!==editingId); saveLocalEvents(); saveRemoteEvents(events); renderEvents(); closeModal()} else {D.title.value=''; D.start.value=''; D.end.value=''}}
D.openAddBtn.addEventListener('click',()=>{const s=displayWeekStartFor(weekOffset); openAddModal(formatISO(s),'09:00','10:00')});
D.primaryBtn.addEventListener('click',submitModal); D.secondaryBtn.addEventListener('click',secondaryModalAction); D.modalBackdrop.addEventListener('click',e=>{if(e.target===D.modalBackdrop)closeModal()});
window.addEventListener('resize',()=>{renderEvents(); updateNowLine()}); setInterval(updateNowLine,60000);
buildCalendar(); renderEvents(); updateNowLine();
requestAnimationFrame(()=>{const st=getComputedStyle(document.documentElement), headerH=parseFloat(st.getPropertyValue('--header-h')), hourH=parseFloat(st.getPropertyValue('--hour-h')), now=new Date(), minutes=now.getHours()*60+now.getMinutes(); D.scroll.scrollTop=Math.max(0,headerH+(minutes/60)*hourH-D.scroll.clientHeight/2)});
})();
</script>
</body>
</html>
